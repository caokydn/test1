<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listening & Fill the Words - Starters</title>

<style>
body{
  margin:0;
  font-family:"Comic Sans MS", sans-serif;
  background:#fef3c7;
  text-align:center;
}
 
h1{
  margin:10px 0;
  color:#ec4899;
}

/* AUDIO */
#audioControls{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px;
  flex-wrap:wrap;
}

button{
  padding:8px 16px;
  font-size:16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:linear-gradient(90deg,#38bdf8,#0ea5e9);
  font-weight:bold;
}

#addBoxBtn{
  background:linear-gradient(90deg,#facc15,#eab308);
}

/* DRAW AREA */
#drawWrapper{
  position:relative;
  max-width:900px;
  margin:0 auto;
}

#bgImage{
  width:100%;
  display:block;
  border-radius:12px;
}

/* WORD BOX */
.wordBox{
  position:absolute;
  min-width:90px;
  min-height:36px;
  padding:6px 10px;
  font-size:20px;
  border:2px dashed #ec4899;
  border-radius:8px;
  background:white;
  cursor:move;
  user-select:none;
}

.wordBox:focus{
  outline:none;
  border-style:solid;
}
</style>
</head>

<body>

<h1>🎧 Listening & Fill the Words – Cambridge Starters 🎉</h1>

<div id="audioControls">
  <button onclick="audio.play()">▶️ Play</button>
  <button onclick="audio.currentTime=0;audio.play()">🔁 Replay</button>
  <button id="addBoxBtn">➕ Add box</button>
</div>

<div id="drawWrapper">
  <img id="bgImage" src="sound/picture.png">

  <!-- BOX CÓ SẴN -->
  <div class="wordBox" contenteditable="true"
       style="top:20px; left:20px;">
  </div>
</div>

<audio id="audio" src="sound/audio.mp3"></audio>

<script>
const wrapper = document.getElementById("drawWrapper");
const addBoxBtn = document.getElementById("addBoxBtn");

let activeBox = null;
let offsetX = 0;
let offsetY = 0;

/* DRAG */
wrapper.addEventListener("pointerdown", e=>{
  if(e.target.classList.contains("wordBox")){
    activeBox = e.target;
    const rect = activeBox.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;
  }
});

wrapper.addEventListener("pointermove", e=>{
  if(activeBox){
    const wrapRect = wrapper.getBoundingClientRect();
    activeBox.style.left = (e.clientX - wrapRect.left - offsetX) + "px";
    activeBox.style.top  = (e.clientY - wrapRect.top  - offsetY) + "px";
  }
});

wrapper.addEventListener("pointerup", ()=> activeBox = null);
wrapper.addEventListener("pointerleave", ()=> activeBox = null);

/* ADD BOX */
addBoxBtn.onclick = ()=>{
  const box = document.createElement("div");
  box.className = "wordBox";
  box.contentEditable = true;
  box.style.top = "20px";
  box.style.left = "20px";
  wrapper.appendChild(box);
  box.focus();
};
</script>

</body>
</html>
